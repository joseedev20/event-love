<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RickyFit | WebApp</title>
<meta name="theme-color" content="#09070d">
<style>
:root{--bg:#08070c;--card:rgba(255,255,255,.075);--card2:rgba(255,255,255,.12);--line:rgba(255,255,255,.16);--txt:#fbf8ff;--mut:#bbb0cc;--hot:#ff3e70;--orange:#ff7040;--lime:#caff19;--cyan:#36e7ff;--warn:#ffd447;--danger:#ff4b5f;--r:26px}*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:radial-gradient(circle at 20% 0%,rgba(255,62,112,.25),transparent 34%),radial-gradient(circle at 90% 12%,rgba(202,255,25,.13),transparent 30%),linear-gradient(#100b18,#060609 48%,#050507);color:var(--txt);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}button,input,textarea{font:inherit;color:inherit}button{border:0;cursor:pointer}input,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.28);border-radius:16px;padding:13px;outline:none}input:focus,textarea:focus{border-color:rgba(202,255,25,.6);box-shadow:0 0 0 3px rgba(202,255,25,.11)}textarea{resize:vertical}label{display:grid;gap:7px;color:var(--mut);font-size:.86rem;font-weight:700}.app{width:min(100vw,430px);height:100dvh;margin:auto;position:relative;overflow:hidden;background:rgba(7,6,11,.56);border-inline:1px solid rgba(255,255,255,.08)}main{height:100%;overflow:auto;padding:26px 17px 108px;scroll-behavior:smooth}main::-webkit-scrollbar{width:0}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin:4px 0 18px}.eyebrow{margin:0 0 8px;color:var(--hot);letter-spacing:.42em;text-transform:uppercase;font-weight:950;font-size:.7rem}h1,h2,h3,p{margin:0}h1{font-size:clamp(2.05rem,10vw,3.2rem);line-height:.92;letter-spacing:-.06em;text-shadow:0 9px 30px rgba(92,199,255,.18)}h2{font-size:1.58rem;line-height:1;letter-spacing:-.045em}h3{font-size:1.04rem;letter-spacing:-.02em}.sub{color:var(--mut);margin-top:8px;line-height:1.35}.avatar{min-width:62px;height:62px;border-radius:999px;background:linear-gradient(135deg,var(--lime),#4cff92);color:#162000;display:grid;place-items:center;font-weight:1000;font-size:1.45rem;box-shadow:0 14px 38px rgba(202,255,25,.22)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.stat{border:1px solid var(--line);border-radius:21px;background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.045));padding:13px;min-height:80px}.stat b{display:block;font-size:1.24rem}.stat span{display:block;margin-top:6px;color:var(--mut);font-size:.66rem;letter-spacing:.25em;text-transform:uppercase}.alert{border:1px solid rgba(255,212,71,.55);background:rgba(255,212,71,.08);color:#fff2ba;border-radius:21px;padding:15px;font-weight:750;line-height:1.35;margin:14px 0}.title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:24px 0 13px}.card{border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.11),rgba(255,255,255,.045));border-radius:var(--r);box-shadow:0 24px 70px rgba(0,0,0,.5);overflow:hidden}.pad{padding:17px}.routine{padding:19px 17px;position:relative;isolation:isolate}.routine:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--a,#ff3e70),transparent 80%);opacity:.18;z-index:-1}.routine-head{display:flex;align-items:center;justify-content:space-between;gap:14px}.go,.icon,.back{display:grid;place-items:center;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.08)}.go{width:52px;height:52px;border-radius:999px;color:var(--lime);font-size:1.55rem}.icon,.back{width:45px;height:45px;border-radius:16px}.meta,.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.13);border-radius:999px;background:rgba(0,0,0,.22);padding:6px 9px;color:var(--mut);font-size:.72rem;font-weight:850}.pill.hot{color:#ff9aae;border-color:rgba(255,62,112,.35);background:rgba(255,62,112,.12)}.pill.lime{color:var(--lime);border-color:rgba(202,255,25,.3);background:rgba(202,255,25,.08)}.pill.cyan{color:#a6f6ff;border-color:rgba(54,231,255,.28);background:rgba(54,231,255,.08)}.list{display:grid;gap:12px}.exercise{display:grid;grid-template-columns:43px 1fr auto;align-items:center;gap:11px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:23px;padding:12px;min-height:88px}.num{width:40px;height:40px;border-radius:15px;display:grid;place-items:center;background:rgba(255,62,112,.14);color:#ff638a;font-weight:1000}.exercise p{color:var(--mut);font-size:.85rem;line-height:1.28;margin-top:5px}.emoji{font-size:1.82rem}.btn{border-radius:17px;min-height:48px;padding:0 15px;font-weight:950;letter-spacing:.06em;text-transform:uppercase}.primary{background:linear-gradient(135deg,var(--hot),var(--orange));color:#1b0710;box-shadow:0 14px 32px rgba(255,62,112,.25)}.ghost{background:rgba(255,255,255,.075);border:1px solid var(--line);color:var(--txt)}.danger{color:#ff9aa6;border-color:rgba(255,75,95,.36);background:rgba(255,75,95,.09)}.full{width:100%;margin-top:16px}.chips{display:flex;gap:8px;overflow:auto;margin:2px -1px 13px;padding:2px 1px 10px}.chips::-webkit-scrollbar{height:0}.chip{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--mut);border-radius:17px;padding:11px 13px;font-weight:900}.chip.active{background:var(--lime);color:#182000}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.info{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:15px 0}.box{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:20px;padding:13px;min-height:70px}.box span{display:block;color:var(--mut);font-size:.65rem;letter-spacing:.29em;text-transform:uppercase;margin-bottom:7px}.box b{color:var(--lime)}.video{aspect-ratio:16/9;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:#121018;margin:14px 0}.video iframe{width:100%;height:100%;border:0}.novideo{height:100%;display:grid;place-items:center;text-align:center;color:var(--mut);padding:18px}.sets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.set{height:56px;border-radius:17px;background:rgba(255,255,255,.075);border:1px solid var(--line);font-weight:1000;font-size:1.2rem}.set.done{background:linear-gradient(135deg,var(--lime),#62ff88);color:#142000;border-color:transparent}.timer{text-align:center;padding:18px;background:linear-gradient(135deg,rgba(255,62,112,.22),rgba(255,255,255,.055))}.circle{width:156px;height:156px;margin:11px auto 16px;border-radius:999px;border:8px solid rgba(255,62,112,.42);display:grid;place-items:center;box-shadow:inset 0 0 38px rgba(255,62,112,.16)}.circle b{font-size:2.8rem;color:var(--hot)}.timer-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}.nav{position:absolute;left:13px;right:13px;bottom:13px;height:75px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:9px;border:1px solid rgba(255,255,255,.13);border-radius:27px;background:rgba(5,5,9,.78);backdrop-filter:blur(18px);box-shadow:0 -12px 45px rgba(0,0,0,.45);z-index:10}.nav button{display:grid;place-items:center;gap:3px;background:transparent;color:var(--mut);border-radius:19px;text-transform:uppercase;letter-spacing:.15em;font-weight:900}.nav small{font-size:.68rem}.nav .on{color:var(--lime);background:rgba(202,255,25,.075)}dialog{width:min(92vw,410px);border:0;padding:0;background:transparent;color:var(--txt)}dialog::backdrop{background:rgba(0,0,0,.74);backdrop-filter:blur(10px)}.modal{display:grid;gap:13px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(31,24,42,.98),rgba(12,10,17,.98));padding:19px;box-shadow:0 24px 70px rgba(0,0,0,.58)}.modal-head,.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;transition:.2s;z-index:20;max-width:min(370px,92vw);padding:13px 15px;border-radius:17px;border:1px solid rgba(202,255,25,.25);background:rgba(10,10,14,.9);box-shadow:0 22px 60px rgba(0,0,0,.55)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.bar{height:12px;border-radius:999px;background:linear-gradient(90deg,#12dfff,#caff19,#ffbc32,#ff3d70);position:relative;margin-top:15px}.dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:28px;border-radius:999px;background:white;box-shadow:0 0 18px white}.macros{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.macro{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:23px;padding:16px}.macro b{display:block;font-size:1.55rem;color:var(--lime);margin-top:7px}.empty{border:1px dashed rgba(255,255,255,.24);color:var(--mut);text-align:center;border-radius:23px;padding:26px}@media (min-width:760px){body{display:grid;place-items:center}.app{height:min(920px,94dvh);border:1px solid rgba(255,255,255,.12);border-radius:38px;box-shadow:0 34px 90px rgba(0,0,0,.65)}}@media(max-width:360px){.grid3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}h1{font-size:2.15rem}}
</style>
</head>
<body>
<div class="app"><main id="app"></main><nav class="nav"><button class="on" data-tab="home"><span>⌂</span><small>Inicio</small></button><button data-tab="routines"><span>🏋️</span><small>Rutinas</small></button><button data-tab="profile"><span>📊</span><small>Perfil</small></button><button data-tab="nutrition"><span>🥗</span><small>Nutrición</small></button></nav></div>
<dialog id="routineDialog"><form class="modal" method="dialog" id="routineForm"><div class="modal-head"><div><p class="eyebrow">Plan semanal</p><h2 id="routineTitle">Rutina</h2></div><button class="icon" value="cancel">×</button></div><input type="hidden" id="rid"><label>Nombre<input id="rname" required></label><div class="grid2"><label>Días<input id="rdays"></label><label>Tipo<input id="rtype"></label></div><div class="grid2"><label>Fase<input id="rphase"></label><label>Diseño<input id="rdesign"></label></div><label>Descripción<textarea id="rdesc" rows="3"></textarea></label><div class="row"><button type="button" class="btn danger" id="delRoutine">Eliminar</button><button class="btn primary">Guardar</button></div></form></dialog>
<dialog id="exerciseDialog"><form class="modal" method="dialog" id="exerciseForm"><div class="modal-head"><div><p class="eyebrow">Técnica + video</p><h2 id="exerciseTitle">Ejercicio</h2></div><button class="icon" value="cancel">×</button></div><input type="hidden" id="erid"><input type="hidden" id="eid"><label>Nombre<input id="ename" required></label><div class="grid2"><label>Grupo muscular<input id="emuscle"></label><label>Ícono<input id="eicon" maxlength="4"></label></div><div class="grid3"><label>Series<input id="esets" type="number" min="1"></label><label>Reps<input id="ereps"></label><label>Descanso seg<input id="erest" type="number" min="15" step="15"></label></div><div class="grid2"><label>Cadencia<input id="ecad"></label><label>Equipo<input id="eeq"></label></div><label>Link de YouTube<input id="eyt" type="url" placeholder="https://youtu.be/... o https://youtube.com/watch?v=..."></label><label>Notas técnicas<textarea id="enotes" rows="3"></textarea></label><div class="row"><button type="button" class="btn danger" id="delExercise">Eliminar</button><button class="btn primary">Guardar</button></div></form></dialog>
<dialog id="profileDialog"><form class="modal" method="dialog" id="profileForm"><div class="modal-head"><div><p class="eyebrow">Cliente</p><h2>Editar perfil</h2></div><button class="icon" value="cancel">×</button></div><label>Nombre<input id="pname" required></label><div class="grid3"><label>Peso kg<input id="pweight" type="number" step=".1"></label><label>Altura m<input id="pheight" type="number" step=".01"></label><label>Edad<input id="page" type="number"></label></div><label>Objetivo<input id="pgoal"></label><label>Alertas o molestias<textarea id="palert" rows="3"></textarea></label><button class="btn primary full">Guardar perfil</button></form></dialog>
<div id="toast" class="toast"></div>
<script>
const KEY='rickyfit.eventlove.v1';
const seed={tab:'home',routineId:'r4',profile:{name:'Lorena',goal:'Disminución de tejido adiposo · 4 días/sem',weight:74.7,height:1.59,age:28,alert:'Rodillas: molestia registrada. Variantes automáticas activadas en Jump Squats.'},nutrition:{calories:1740,protein:130,carbs:178,fats:52,water:2.4,notes:['Priorizar proteína en cada comida.','Carbohidratos alrededor del entrenamiento.','Si hay dolor de rodilla, cambiar saltos por variantes sin impacto.']},routines:[{id:'r1',name:'Full Body',days:'Martes · Jueves',type:'Fuerza & Potencia',phase:'AA',design:'Base atlética',accent:'#9cff1a',description:'Fuerza general con técnica controlada.',exercises:[{id:'e101',name:'Sentadilla Goblet',muscle:'Pierna',sets:4,reps:'8-10',rest:120,cadence:'3-1-1',equipment:'Mancuerna',icon:'🏋️',youtube:'',notes:'Pecho arriba, abdomen firme y rodillas alineadas.'},{id:'e102',name:'Press Militar Mancuernas',muscle:'Hombro',sets:4,reps:'8-12',rest:90,cadence:'2-0-2',equipment:'Mancuernas',icon:'💪',youtube:'',notes:'No arquear la espalda. Subir controlado.'}]},{id:'r2',name:'Coordinación',days:'Martes · Jueves',type:'Coordinación & Resistencia',phase:'AA',design:'Control motor',accent:'#00d9ff',description:'Ritmo, coordinación y resistencia.',exercises:[{id:'e201',name:'Escaladores controlados',muscle:'Core',sets:4,reps:'30 seg',rest:60,cadence:'Ritmo',equipment:'Peso corporal',icon:'⛰️',youtube:'',notes:'Hombros sobre muñecas y cadera estable.'}]},{id:'r3',name:'Core',days:'Miércoles · Sábado',type:'Core & Flexibilidad',phase:'H1',design:'Estabilidad',accent:'#ff8b4a',description:'Abdomen, movilidad y control postural.',exercises:[{id:'e301',name:'Plancha frontal',muscle:'Core',sets:4,reps:'35-45 seg',rest:60,cadence:'Isométrico',equipment:'Peso corporal',icon:'🧱',youtube:'',notes:'Cadera neutra, abdomen activo y respiración controlada.'}]},{id:'r4',name:'Full Body',days:'Viernes · Sábado',type:'Resistencia',phase:'H1',design:'Tensión Mecánica',accent:'#ff3e70',description:'Sesión full body con control, tensión y resistencia.',exercises:[{id:'e401',name:'Pistol Squats TRX',muscle:'Cuádriceps',sets:4,reps:'8-12 por pierna',rest:120,cadence:'3-0-2',equipment:'TRX + peso corporal',icon:'🦿',youtube:'https://www.youtube.com/watch?v=QGkRRWqzGVM',notes:'Usar el TRX como asistencia, bajar controlado y evitar colapso de rodilla.'},{id:'e402',name:'Press Plano Mancuernas',muscle:'Pectoral',sets:4,reps:'8-12',rest:120,cadence:'3-0-2',equipment:'Mancuernas',icon:'🏋️',youtube:'',notes:'Escápulas estables y recorrido controlado.'},{id:'e403',name:'Zancadas con Salto',muscle:'Cuádriceps',sets:4,reps:'10 por pierna',rest:90,cadence:'Explosivo',equipment:'Peso corporal',icon:'🧎',youtube:'',notes:'Si hay molestia de rodilla, cambiar por zancada atrás sin salto.'},{id:'e404',name:'Dominadas TRX Asistidas',muscle:'Dorsal',sets:4,reps:'10',rest:90,cadence:'2-1-2',equipment:'TRX',icon:'🔲',youtube:'',notes:'Activar espalda antes de flexionar codos.'},{id:'e405',name:'Peso Muerto Mancuernas',muscle:'Espalda baja',sets:4,reps:'12',rest:120,cadence:'3-1-2',equipment:'Mancuernas',icon:'⚖️',youtube:'',notes:'Bisagra de cadera; espalda larga y cuello neutro.'},{id:'e406',name:'Subir y Bajar Banco',muscle:'Cuádriceps',sets:4,reps:'15 por pierna',rest:90,cadence:'2-0-2',equipment:'Con peso',icon:'📦',youtube:'',notes:'Empujar con la pierna que sube; no impulsarse con la de abajo.'}]}]};
let state=load(),timer=null,timerBase=120;const app=document.getElementById('app'),toast=document.getElementById('toast');
function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(seed)}catch(e){return structuredClone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function id(p){return p+Math.random().toString(36).slice(2,9)}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function msg(t){toast.textContent=t;toast.classList.add('show');clearTimeout(msg.t);msg.t=setTimeout(()=>toast.classList.remove('show'),2100)}function routine(i=state.routineId){return state.routines.find(r=>r.id===i)||state.routines[0]}function exercise(rid,eid){let r=routine(rid);return r.exercises.find(e=>e.id===eid)||r.exercises[0]}function bmi(){let p=state.profile,v=Number(p.weight)/(Number(p.height)**2);return isFinite(v)?v:0}function bmiLabel(v){return v<18.5?'Bajo peso':v<25?'Normal':v<30?'Sobrepeso':'Obesidad'}function ytembed(u=''){let s=String(u).trim(),ps=[/youtube\.com\/watch\?v=([^&]+)/,/youtu\.be\/([^?&]+)/,/youtube\.com\/shorts\/([^?&]+)/,/youtube\.com\/embed\/([^?&]+)/];for(let p of ps){let m=s.match(p);if(m&&m[1])return 'https://www.youtube.com/embed/'+m[1]}return ''}function top(title,sub,act=''){return `<section class="top"><div><p class="eyebrow">RickyFit · Entrenador</p><h1>${title}</h1><p class="sub">${sub}</p></div>${act}</section>`}
function setTab(t){state.tab=t;save();document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));render()}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
function render(){if(state.tab==='home')home();if(state.tab==='routines')routines();if(state.tab==='profile')profile();if(state.tab==='nutrition')nutrition()}
function home(){let p=state.profile,r=routine(),v=bmi();app.innerHTML=top(`Hola, ${esc(p.name)} 👋`,esc(p.goal),`<button class="avatar" id="editP">${esc((p.name||'L')[0].toUpperCase())}</button>`)+`<div class="stats"><div class="stat"><b>${esc(p.weight)}kg</b><span>Peso</span></div><div class="stat"><b>${esc(p.height)}m</b><span>Altura</span></div><div class="stat"><b>${v.toFixed(2)}</b><span>IMC</span></div></div>${p.alert?`<div class="alert">⚠️ ${esc(p.alert)}</div>`:''}<div class="title"><div><p class="eyebrow">Rutina sugerida</p><h2>${esc(r.name)}</h2></div><button class="btn ghost" id="allR">Ver todo</button></div>${routineCard(r,1)}<div class="title"><h2>Cardio autónomo</h2></div><div class="list"><article class="exercise"><div class="num">🚴</div><div><h3>Días 5 y 6 — Autónomo</h3><p>45-70 min: bicicleta, trotadora, escaleras o cuerda.</p></div><div class="emoji">🔥</div></article><article class="exercise"><div class="num">😴</div><div><h3>Día 7 — Descanso</h3><p>7-9 horas de sueño. Recuperación total.</p></div><div class="emoji">✅</div></article></div>`;document.getElementById('editP').onclick=openProfile;document.getElementById('allR').onclick=()=>setTab('routines');bindRoutine()}
function routineCard(r,compact=0){return `<article class="card routine" style="--a:${r.accent||'#ff3e70'}" data-routine="${r.id}"><div class="routine-head"><div><p class="eyebrow">Rutina · ${esc(r.days)}</p><h2>${esc(r.name)}</h2><p class="sub">${esc(r.type)}</p></div><button class="go" data-open="${r.id}">›</button></div><div class="meta"><span class="pill hot">🏋️ ${r.exercises.length} ejercicios</span><span class="pill cyan">▣ Videos embed</span><span class="pill lime">⏱ Timer global</span></div>${compact?`<p class="sub">${esc(r.description)}</p>`:''}</article>`}
function bindRoutine(){document.querySelectorAll('[data-routine]').forEach(c=>c.onclick=()=>detail(c.dataset.routine));document.querySelectorAll('[data-open]').forEach(b=>b.onclick=e=>{e.stopPropagation();detail(b.dataset.open)})}
function routines(){let phases=['Todas',...new Set(state.routines.map(r=>r.phase).filter(Boolean))];app.innerHTML=top('Tus rutinas','Plan semanal con videos, timer, técnica y edición rápida.',`<button class="avatar" id="addR">+</button>`)+`<div class="chips">${phases.map((p,i)=>`<button class="chip ${i?'':'active'}" data-filter="${esc(p)}">${esc(p)}</button>`).join('')}</div><div class="list" id="routineList">${state.routines.map(routineCard).join('')}</div>`;document.getElementById('addR').onclick=()=>openRoutine();bindRoutine();document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));ch.classList.add('active');let f=ch.dataset.filter,arr=f==='Todas'?state.routines:state.routines.filter(r=>r.phase===f);document.getElementById('routineList').innerHTML=arr.map(routineCard).join('')||'<div class="empty">No hay rutinas para este filtro.</div>';bindRoutine()})}
function detail(rid){state.routineId=rid;state.tab='routines';save();document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab==='routines'));let r=routine(rid);app.innerHTML=`<section class="top"><button class="back" id="back">‹</button><div style="flex:1"><p class="eyebrow">Rutina · ${esc(r.days)}</p><h1>${esc(r.name)}</h1><p class="sub">${esc(r.type)} · ${r.exercises.length} ejercicios</p></div><button class="icon" id="editR">✎</button></section><div class="info"><div class="box"><span>Fase</span><b>${esc(r.phase||'—')}</b></div><div class="box"><span>Diseño</span><b>${esc(r.design||'—')}</b></div></div><div class="title"><h2>Ejercicios</h2><button class="btn ghost" id="addE">+ Agregar</button></div><div class="list">${r.exercises.map((e,i)=>exerciseRow(e,i,r.id)).join('')||'<div class="empty">Agrega el primer ejercicio y pega su link de YouTube.</div>'}</div><button class="btn primary full" id="start">▶ Iniciar rutina</button>`;document.getElementById('back').onclick=routines;document.getElementById('editR').onclick=()=>openRoutine(r.id);document.getElementById('addE').onclick=()=>openExercise(r.id);document.getElementById('start').onclick=()=>r.exercises[0]?exerciseDetail(r.id,r.exercises[0].id):msg('Agrega ejercicios antes de iniciar.');document.querySelectorAll('[data-ex]').forEach(x=>x.onclick=()=>exerciseDetail(x.dataset.rid,x.dataset.ex))}
function exerciseRow(e,i,rid){return `<article class="exercise" data-rid="${rid}" data-ex="${e.id}"><div class="num">${i+1}</div><div><h3>${esc(e.name)}</h3><p>${esc(e.sets)} series × ${esc(e.reps)} · ${esc(e.equipment||'Sin equipo')}</p><div class="tags"><span class="pill hot">${esc(e.muscle||'General')}</span>${ytembed(e.youtube)?'<span class="pill hot">▶ Video</span>':'<span class="pill">Sin video</span>'}</div></div><div class="emoji">${esc(e.icon||'🏋️')}</div></article>`}
function exerciseDetail(rid,eid){let e=exercise(rid,eid),em=ytembed(e.youtube);timerBase=Number(e.rest||120);app.innerHTML=`<section class="top"><button class="back" id="backD">‹</button><div style="flex:1"><p class="eyebrow">Técnica + video</p><h1 style="font-size:2.3rem">${esc(e.name)}</h1><p class="sub">${esc(e.muscle||'')}</p></div><button class="icon" id="editE">✎</button></section><div class="info"><div class="box"><span>Series</span><b>${esc(e.sets)}</b></div><div class="box"><span>Reps</span><b>${esc(e.reps)}</b></div><div class="box"><span>Descanso</span><b>${esc(e.rest)} seg</b></div><div class="box"><span>Cadencia</span><b>${esc(e.cadence||'—')}</b></div></div><div class="video">${em?`<iframe src="${em}" title="${esc(e.name)}" allowfullscreen loading="lazy"></iframe>`:'<div class="novideo">Pega un link de YouTube en el editor y el video aparecerá aquí automáticamente.</div>'}</div><article class="card pad"><p class="eyebrow">Técnica correcta</p><p class="sub">${esc(e.notes||'Sin notas técnicas todavía.')}</p></article><div class="title"><h2>Marcar series</h2><span id="counter" class="sub">0/${e.sets} series</span></div><div class="sets">${Array.from({length:Number(e.sets||1)},(_,i)=>`<button class="set">${i+1}</button>`).join('')}</div><article class="card timer" style="margin-top:16px"><p class="eyebrow">Temporizador de descanso</p><div class="circle"><b id="ttext">${fmt(timerBase)}</b></div><div class="timer-actions"><button class="btn ghost" data-rest="90">1:30</button><button class="btn ghost" data-rest="120">2:00</button><button class="btn ghost" data-rest="180">3:00</button><button class="btn ghost" data-rest="240">4:00</button><button class="btn danger" id="stopT">Parar</button></div></article>`;document.getElementById('backD').onclick=()=>detail(rid);document.getElementById('editE').onclick=()=>openExercise(rid,eid);let sets=[...document.querySelectorAll('.set')],c=document.getElementById('counter');sets.forEach(s=>s.onclick=()=>{s.classList.toggle('done');let d=sets.filter(x=>x.classList.contains('done')).length;c.textContent=`${d}/${sets.length} series`;if(s.classList.contains('done'))startT(timerBase)});document.querySelectorAll('[data-rest]').forEach(b=>b.onclick=()=>startT(Number(b.dataset.rest)));document.getElementById('stopT').onclick=()=>{clearInterval(timer);document.getElementById('ttext').textContent=fmt(timerBase)}}
function fmt(s){s=Math.max(0,Number(s||0));return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}function startT(s){clearInterval(timer);let left=s,el=document.getElementById('ttext');el.textContent=fmt(left);timer=setInterval(()=>{left--;if(el)el.textContent=fmt(left);if(left<=0){clearInterval(timer);msg('Descanso terminado. Siguiente serie.');if(navigator.vibrate)navigator.vibrate([120,80,120])}},1000)}
function profile(){let p=state.profile,v=bmi(),pos=Math.max(0,Math.min(100,((v-16)/(40-16))*100));app.innerHTML=top('Perfil','Datos físicos, alertas y mediciones.',`<button class="avatar" id="editP">${esc((p.name||'L')[0].toUpperCase())}</button>`)+`<div class="stats"><div class="stat"><b>${esc(p.weight)}kg</b><span>Peso</span></div><div class="stat"><b>${esc(p.height)}m</b><span>Altura</span></div><div class="stat"><b>${esc(p.age)}</b><span>Años</span></div></div>${p.alert?`<div class="alert">⚠️ ${esc(p.alert)}</div>`:''}<article class="card pad"><p class="eyebrow">IMC · Excel hoja22</p><h1>${v.toFixed(2)}</h1><p class="sub">${bmiLabel(v)}</p><div class="bar"><span class="dot" style="left:${pos}%"></span></div></article><button class="btn primary full" id="editP2">Editar perfil</button>`;document.getElementById('editP').onclick=openProfile;document.getElementById('editP2').onclick=openProfile}
function nutrition(){let n=state.nutrition;app.innerHTML=top('Nutrición','Guía simple para acompañar el entrenamiento.')+`<div class="macros"><div class="macro"><span class="pill hot">Calorías</span><b>${n.calories}</b><p class="sub">kcal / día</p></div><div class="macro"><span class="pill lime">Proteína</span><b>${n.protein}g</b><p class="sub">meta diaria</p></div><div class="macro"><span class="pill cyan">Carbos</span><b>${n.carbs}g</b><p class="sub">energía</p></div><div class="macro"><span class="pill hot">Grasas</span><b>${n.fats}g</b><p class="sub">balance</p></div></div><div class="title"><h2>Notas</h2></div><div class="list">${n.notes.map(x=>`<article class="exercise"><div class="num">✓</div><div><h3>${esc(x)}</h3><p>Recomendación del plan.</p></div><div class="emoji">🥗</div></article>`).join('')}</div>`}
function openRoutine(rid=null){let r=rid?routine(rid):null;document.getElementById('routineTitle').textContent=r?'Editar rutina':'Agregar rutina';document.getElementById('rid').value=r?.id||'';document.getElementById('rname').value=r?.name||'';document.getElementById('rdays').value=r?.days||'';document.getElementById('rtype').value=r?.type||'';document.getElementById('rphase').value=r?.phase||'';document.getElementById('rdesign').value=r?.design||'';document.getElementById('rdesc').value=r?.description||'';document.getElementById('delRoutine').style.visibility=r?'visible':'hidden';document.getElementById('routineDialog').showModal()}
document.getElementById('routineForm').onsubmit=e=>{e.preventDefault();let rid=document.getElementById('rid').value,p={name:rname.value.trim(),days:rdays.value.trim(),type:rtype.value.trim(),phase:rphase.value.trim(),design:rdesign.value.trim(),description:rdesc.value.trim()};if(rid){Object.assign(routine(rid),p);msg('Rutina actualizada.')}else{let nr={id:id('r'),accent:'#ff3e70',...p,exercises:[]};state.routines.unshift(nr);state.routineId=nr.id;msg('Rutina creada.')}save();routineDialog.close();routines()};document.getElementById('delRoutine').onclick=()=>{let rid=document.getElementById('rid').value;state.routines=state.routines.filter(r=>r.id!==rid);state.routineId=state.routines[0]?.id;save();routineDialog.close();routines();msg('Rutina eliminada.')};
function openExercise(rid,eid=null){let e=eid?exercise(rid,eid):null;exerciseTitle.textContent=e?'Editar ejercicio':'Agregar ejercicio';erid.value=rid;eid?document.getElementById('eid').value=eid:document.getElementById('eid').value='';ename.value=e?.name||'';emuscle.value=e?.muscle||'';eicon.value=e?.icon||'🏋️';esets.value=e?.sets||4;ereps.value=e?.reps||'8-12';erest.value=e?.rest||120;ecad.value=e?.cadence||'';eeq.value=e?.equipment||'';eyt.value=e?.youtube||'';enotes.value=e?.notes||'';delExercise.style.visibility=e?'visible':'hidden';exerciseDialog.showModal()}
document.getElementById('exerciseForm').onsubmit=e=>{e.preventDefault();let rid=erid.value,eidv=eid.value,r=routine(rid),p={name:ename.value.trim(),muscle:emuscle.value.trim(),icon:eicon.value.trim()||'🏋️',sets:Number(esets.value||4),reps:ereps.value.trim(),rest:Number(erest.value||120),cadence:ecad.value.trim(),equipment:eeq.value.trim(),youtube:eyt.value.trim(),notes:enotes.value.trim()};if(eidv){Object.assign(exercise(rid,eidv),p);msg('Ejercicio actualizado.')}else{r.exercises.push({id:id('e'),...p});msg('Ejercicio agregado.')}save();exerciseDialog.close();detail(rid)};document.getElementById('delExercise').onclick=()=>{let rid=erid.value,eidv=eid.value,r=routine(rid);r.exercises=r.exercises.filter(e=>e.id!==eidv);save();exerciseDialog.close();detail(rid);msg('Ejercicio eliminado.')};
function openProfile(){let p=state.profile;pname.value=p.name||'';pweight.value=p.weight||'';pheight.value=p.height||'';page.value=p.age||'';pgoal.value=p.goal||'';palert.value=p.alert||'';profileDialog.showModal()}document.getElementById('profileForm').onsubmit=e=>{e.preventDefault();state.profile={...state.profile,name:pname.value.trim(),weight:Number(pweight.value||0),height:Number(pheight.value||0),age:Number(page.value||0),goal:pgoal.value.trim(),alert:palert.value.trim()};save();profileDialog.close();msg('Perfil actualizado.');render()};render();
</script>
</body>
