<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RickyFit | Generador iframe YouTube</title>
  <style>
    :root{--bg:#08070c;--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.16);--text:#fbf8ff;--muted:#bdb2cf;--hot:#ff3e70;--orange:#ff7040;--lime:#caff19}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0%,rgba(255,62,112,.26),transparent 34%),radial-gradient(circle at 90% 12%,rgba(202,255,25,.13),transparent 30%),linear-gradient(#100b18,#060609 48%,#050507);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;display:grid;place-items:center}
    main{width:min(100%,760px)}.card{border:1px solid var(--line);background:linear-gradient(135deg,rgba(255,255,255,.11),rgba(255,255,255,.045));border-radius:28px;padding:22px;box-shadow:0 28px 80px rgba(0,0,0,.5)}
    .eyebrow{margin:0 0 10px;color:var(--hot);letter-spacing:.42em;text-transform:uppercase;font-weight:950;font-size:.72rem}h1{margin:0;font-size:clamp(2rem,8vw,4rem);line-height:.92;letter-spacing:-.06em}p{color:var(--muted);line-height:1.45}.row{display:grid;grid-template-columns:1fr auto;gap:10px;margin:18px 0}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--text);border-radius:17px;padding:14px;outline:none}textarea{min-height:160px;resize:vertical}button{border:0;border-radius:17px;padding:0 18px;font-weight:950;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:linear-gradient(135deg,var(--hot),var(--orange));color:#1b0710}.video{aspect-ratio:16/9;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:#111018;margin:18px 0}.video iframe{width:100%;height:100%;border:0}.hint{font-size:.9rem}.actions{display:flex;gap:10px;flex-wrap:wrap}.ghost{background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text);min-height:48px}.copy{min-height:52px}.ok{color:var(--lime);font-weight:800}.toplink{display:inline-flex;color:var(--lime);text-decoration:none;margin-bottom:14px;font-weight:800}
    @media(max-width:560px){body{padding:14px}.card{padding:18px}.row{grid-template-columns:1fr}button{min-height:52px}}
  </style>
</head>
<body>
  <main>
    <a class="toplink" href="./">← Volver a RickyFit</a>
    <section class="card">
      <p class="eyebrow">RickyFit · Videos</p>
      <h1>Generador iframe YouTube</h1>
      <p>Pega cualquier link de YouTube y se genera el iframe listo para usar en ejercicios, rutinas o páginas HTML.</p>

      <div class="row">
        <input id="youtubeUrl" placeholder="Pega aquí el link: https://youtu.be/... o https://youtube.com/watch?v=..." />
        <button id="generate" class="copy">Generar</button>
      </div>

      <div class="video" id="preview">
        <div style="height:100%;display:grid;place-items:center;color:var(--muted);text-align:center;padding:20px">La vista previa aparecerá aquí.</div>
      </div>

      <p class="hint">Código generado:</p>
      <textarea id="iframeCode" readonly></textarea>

      <div class="actions">
        <button id="copyCode" class="ghost">Copiar iframe</button>
        <button id="clear" class="ghost">Limpiar</button>
      </div>
      <p id="status" class="ok"></p>
    </section>
  </main>

  <script>
    const input = document.getElementById('youtubeUrl');
    const preview = document.getElementById('preview');
    const iframeCode = document.getElementById('iframeCode');
    const status = document.getElementById('status');

    function getYoutubeId(url) {
      const text = String(url || '').trim();
      const patterns = [
        /youtube\.com\/watch\?v=([^&]+)/,
        /youtu\.be\/([^?&]+)/,
        /youtube\.com\/shorts\/([^?&]+)/,
        /youtube\.com\/embed\/([^?&]+)/
      ];
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match && match[1]) return match[1];
      }
      return '';
    }

    function buildIframe(videoId) {
      return `<iframe\n  width="100%"\n  height="315"\n  src="https://www.youtube.com/embed/${videoId}"\n  title="Video tutorial del ejercicio"\n  frameborder="0"\n  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"\n  allowfullscreen>\n</iframe>`;
    }

    function generate() {
      const id = getYoutubeId(input.value);
      status.textContent = '';
      if (!id) {
        preview.innerHTML = '<div style="height:100%;display:grid;place-items:center;color:#ff9aa6;text-align:center;padding:20px">Link de YouTube no válido.</div>';
        iframeCode.value = '';
        return;
      }
      const code = buildIframe(id);
      iframeCode.value = code;
      preview.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" title="Video tutorial del ejercicio" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
      status.textContent = 'Iframe generado correctamente.';
    }

    document.getElementById('generate').addEventListener('click', generate);
    input.addEventListener('keydown', event => { if (event.key === 'Enter') generate(); });
    document.getElementById('copyCode').addEventListener('click', async () => {
      if (!iframeCode.value) generate();
      if (!iframeCode.value) return;
      await navigator.clipboard.writeText(iframeCode.value);
      status.textContent = 'Iframe copiado.';
    });
    document.getElementById('clear').addEventListener('click', () => {
      input.value = '';
      iframeCode.value = '';
      status.textContent = '';
      preview.innerHTML = '<div style="height:100%;display:grid;place-items:center;color:var(--muted);text-align:center;padding:20px">La vista previa aparecerá aquí.</div>';
    });
  </script>
</body>
</html>
